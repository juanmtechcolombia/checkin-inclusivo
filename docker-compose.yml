version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: checkin-postgres
    environment:
      POSTGRES_USER: checkin
      POSTGRES_PASSWORD: checkin_pass
      POSTGRES_DB: checkin_inclusivo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U checkin -d checkin_inclusivo"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: checkin-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://checkin:checkin_pass@postgres:5432/checkin_inclusivo?schema=public"
      JWT_SECRET: "dev-secret-change-in-production-min-32-chars!!"
      JWT_EXPIRATION: "24h"
      OTP_EXPIRY_MINUTES: 5
      OTP_LENGTH: 6
      QR_EXPIRY_MINUTES: 10
      QR_SECRET: "dev-qr-secret-change-in-production"
      API_PORT: 3001
      API_HOST: 0.0.0.0
      CORS_ORIGIN: "http://localhost:5173"
      VAULT_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      NODE_ENV: development
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: checkin-web
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3001"

volumes:
  postgres_data:
